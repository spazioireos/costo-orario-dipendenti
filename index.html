<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ===================== UTILITIES =====================
const fmt = (n, dec) => {
  if (dec === undefined) dec = 2;
  if (n === null || n === undefined || isNaN(n)) return '-';
  const v = Number(n);
  if (v === 0) return '-';
  return v.toLocaleString('it-IT', { minimumFractionDigits: dec, maximumFractionDigits: dec });
};
const fmt4 = (n) => fmt(n, 4);
const fmt2 = (n) => fmt(n, 2);
const fmtEur = (n) => fmt(n, 2) + (n === 0 || n === null || isNaN(n) ? '' : ' €');
const fmtPct = (n) => fmt(n, 2);

// Parse italiano: accetta "1.234,56" e "1234.56"
const parseIt = (s) => {
  if (s === null || s === undefined || s === '') return 0;
  if (typeof s === 'number') return s;
  const cleaned = String(s).replace(/\s/g,'').replace(/\./g,'').replace(',', '.');
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
};

const uid = () => 'd' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

const COLORI = ['#1e3a5f','#2d7a3e','#b08020','#8b2d5c','#5b3d9c','#2a7a7a','#a0522d','#6b7280'];
const LIVELLI = ['A1','A2','B1','B2','C1','C2','C3','D1','D2','D3','E1','E2','F1','F2','Altro'];

// ===================== DEFAULT DIPENDENTE =====================
// Valori predefiniti coerenti con il file Excel originale di Spazio Ireos
const newDipendente = () => ({
  id: uid(),
  cognome: '',
  nome: '',
  livello: 'D1',
  note: '',
  colore: COLORI[0],
  createdAt: new Date().toISOString(),

  // Input principali (riga 2 del file)
  mesiLavoro: 12,
  mesiMaternita: 0,
  lordoTPieno: 1605.99,
  scattiTPieno: 0,
  premiTPieno: 0,
  supermin: 41,
  oreSettContrattuali: 18,
  giorniSettTeorici: 6,
  fatturatoAnnuoPrevisto: 440000,

  // Coefficienti ore (colonna O)
  settimaneEffettLavorabili: 45.25,  // O6
  oreSettEffettLavorabili: 18,       // O7

  // Sezione I - Costi del lavoro puri (colonne E/F coefficienti)
  aliquotaQuattordicesima: 50,        // E8
  giorniFerieAnnui: 30,               // E10
  festivitaGodute: 0,                 // F12_goduta (F12 del file = 13 fissi non goduti)
  festivitaNonGodute: 13,             // F12
  // Malattia: E13 = 12/12*H2*2 (autocalc)
  aliquotaMalattia: 50,               // I13*100 = 50
  giorniPermessiAltroTipo: 0,         // E15
  premiMesiToglibili: 0,              // F17
  premiImportoMese: 0,                // H17
  // TFR
  aliquotaTFR: 13.5,                  // I18
  rivTFR_anzianita: 1,                // E20
  rivTFR_istat: 2,                    // F20
  // Previdenza complementare
  aliquotaPrevComplTFR: 1.5,          // E22
  pagamentoPrevComplTFR: 0,           // F22
  // INPS
  aliquotaINPS: 26.4,                 // E24
  pagamentoINPS: 100,                 // F24
  aliquotaINPSTempoDet: 1.4,          // E25
  pagamentoINPSTempoDet: 100,         // F25
  aliquotaINPSFIS: 0.53333,           // E26
  pagamentoINPSFIS: 100,              // F26
  aliquotaINAIL: 0.5,                 // E27
  pagamentoINAIL: 100,                // F27
  aliquotaIRAP: 3.9,                  // E28
  pagamentoIRAP: 0,                   // F28
  // Assistenza sanitaria (solo tempi indeterminati)
  assistenzaSanitariaAnnua: 132,      // E29
  // Altri importi
  bpDichiarazioniMese: 25,            // E30
  formazioneAnno: 250,                // E31
  rimborsoKmMesiToglibili: 0,         // F33
  rimborsoKmImportoMese: 0,           // H33

  // Sezione II - Spese imposte standard / banche / commercialista
  altriOneriBancari: 500,             // I41
  iresCoeff: 24,                      // G42 (coeff su H42 che è 2% di fatturato)
  commercialistaCoeff: 1.1,           // G43 (1,1% su 98% fatturato)

  // Sezione III - Spese sede
  affittoSede: 1800,                  // I48
  cda: 17500,                         // I49
  abbonamentiGare: 200,               // I50
  sitoPec: 600,                       // I51
  rc: 1700,                           // I52

  // Sezione IV - Spese extra operatore
  giorniSostituzione: 28,             // I57
  costoGiornoSostituzione: 0,         // H57
  raccomandata: 9,                    // H58
  visitaMedica: 40,                   // H59
  oreFormazioneSicurezza: 0,          // H60
  oreIndiretteAltre: 0,               // H61
  oreMaggiorazStraord: 0,             // H62
  utenzeTelMobiliMese: 0,             // H63
  rsKmMese: 0,                        // H64

  // Sezione VII - Naspi / Ticket licenziamento
  aliquotaNaspi: 41,                  // H79
  massimaleAnnuoNaspi: 1221.24        // A80
});

// ===================== CALCOLATORE =====================
// Ricostruzione fedele delle formule del file Excel "Criteri orari"
// Sezione V (SPESE DEL SERVIZIO) omessa come da richiesta
function calcola(d) {
  const H2  = Number(d.mesiLavoro) || 0;
  const I2  = Number(d.mesiMaternita) || 0;
  const K2  = Number(d.lordoTPieno) || 0;
  const L2  = Number(d.scattiTPieno) || 0;
  const M2  = Number(d.premiTPieno) || 0;
  const N2  = Number(d.supermin) || 0;
  const O2  = Number(d.oreSettContrattuali) || 0;
  const Q2  = Number(d.giorniSettTeorici) || 1;
  const S2  = Number(d.fatturatoAnnuoPrevisto) || 0;

  const H3  = Math.round(H2);
  const J2  = (K2 + L2 + M2 + N2) / 165;   // Importo orario base CCNL (a tempo pieno)
  const P2  = O2 * 165 / 38;               // Ore mese teoriche *4.342
  const R2  = Q2 ? O2 / Q2 : 0;            // Ore/giorno teoriche

  // Catena ore
  const O5  = H2 * 4.3452;                 // Settimane vere per mesi contratto
  const O6  = Number(d.settimaneEffettLavorabili) || 0;
  const O7  = Number(d.oreSettEffettLavorabili) || 0;
  const O8  = O6 * O7;                     // Ore effettive intero periodo
  const O9  = O5 ? O8 / O5 : 0;            // Ore settimanali realissime
  const O10 = Q2 ? O9 / Q2 : 0;            // Ore giorno realissime

  // ===== SEZIONE I - COSTI DEL LAVORO PURI =====
  // Retribuzione mesi lavorati
  const H5 = H2 && P2 ? ((K2 + L2 + M2 + N2) / 38 * O2) / P2 * O8 / H2 : 0;
  const I5 = H2 - I2;
  const J5 = H5 * I5;

  // Tredicesima (stipendio mensile proporzionato * mesi/12)
  const H6 = (K2 + L2 + M2 + N2) / 38 * O2;
  const I6 = H3 * 1 / 12;
  const J6 = H6 * I6;

  // Quattordicesima (H6 * (H3/12/100*aliquota))
  const E8 = Number(d.aliquotaQuattordicesima) || 0;
  const H8 = H6;
  const I8 = (H3 * 1 / 12) / 100 * E8;
  const J8 = H8 * I8;

  // Ferie e permessi ex festività (H6/26 * giorni) * mesi/12
  const E10 = Number(d.giorniFerieAnnui) || 0;
  const H10 = H6 / 26 * E10;
  const I10 = H3 * 1 / 12;
  const J10 = H10 * I10;

  // Festività godute e non godute (solo non godute)
  const F12 = Number(d.festivitaNonGodute) || 0;
  const E12 = -F12 + 13; // informativo: residuo 13-nonGodute (se >0 significa godute)
  const H12 = H6 / 26 * F12;
  const I12 = 1;
  const J12 = H12 * I12;

  // Malattia (presunzione 2gg/mese al 50%)
  const E13 = 12 / 12 * H2 * 2;
  const H13 = H6 / 26 * E13;
  const I13 = (Number(d.aliquotaMalattia) || 0) / 100;
  const J13 = H13 * I13;

  // Permessi altra tipologia
  const E15 = Number(d.giorniPermessiAltroTipo) || 0;
  const H15 = H6 / 26 * E15;
  const I15 = 1;
  const J15 = H15 * I15;

  // Imponibile I (retribuzioni pure)
  const L15 = J5 + J6 + J8 + J10 + J12 + J13 + J15;

  // Premi (una tantum)
  const F17 = Number(d.premiMesiToglibili) || 0;
  const E17 = H2 - F17;
  const H17 = Number(d.premiImportoMese) || 0;
  const J17 = H17 * E17;

  // Imponibile II
  const L17 = L15 + J17;

  // TFR maturato nell'anno (L15 / aliquota)
  const I18 = Number(d.aliquotaTFR) || 1;
  const H18 = L15;
  const J18 = I18 ? H18 / I18 : 0;

  // Rivalutazione TFR
  const E20 = Number(d.rivTFR_anzianita) || 0;
  const F20 = Number(d.rivTFR_istat) || 0;
  const J20 = (J18 * E20 * E20 / 100 * 1.5) + J18 / 100 * F20 / 100 * 75 * E20;

  // Imponibile III
  const L20 = L17 + J18 + J20;

  // Previdenza complementare TFR
  const E22 = Number(d.aliquotaPrevComplTFR) || 0;
  const F22 = Number(d.pagamentoPrevComplTFR) || 0;
  const H22 = L15;
  const I22 = E22 / 100 * F22;
  const J22 = H22 * I22 / 100;

  // Contributi INPS
  const E24 = Number(d.aliquotaINPS) || 0;
  const F24 = Number(d.pagamentoINPS) || 0;
  const H24 = L17;
  const I24 = E24 / 100 * F24;
  const J24 = H24 * I24 / 100;

  const E25 = Number(d.aliquotaINPSTempoDet) || 0;
  const F25 = Number(d.pagamentoINPSTempoDet) || 0;
  const H25 = L17;
  const I25 = E25 / 100 * F25;
  const J25 = H25 * I25 / 100;

  const E26 = Number(d.aliquotaINPSFIS) || 0;
  const F26 = Number(d.pagamentoINPSFIS) || 0;
  const H26 = L17;
  const I26 = E26 / 100 * F26;
  const J26 = H26 * I26 / 100;

  const E27 = Number(d.aliquotaINAIL) || 0;
  const F27 = Number(d.pagamentoINAIL) || 0;
  const H27 = L17;
  const I27 = E27 / 100 * F27;
  const J27 = H27 * I27 / 100;

  // IRAP (su imponibile III)
  const E28 = Number(d.aliquotaIRAP) || 0;
  const F28 = Number(d.pagamentoIRAP) || 0;
  const H28 = L20;
  const I28 = E28 / 100 * F28;
  const J28 = H28 * I28 / 100;

  // Assistenza sanitaria integrativa (solo se E25=0, ossia non tempo determinato)
  const E29 = Number(d.assistenzaSanitariaAnnua) || 0;
  const F29 = (E25 === 0) ? 100 : 0;
  const J29 = E29 / 100 * F29;

  // BP e dichiarazioni (€/mese * mesi)
  const E30 = Number(d.bpDichiarazioniMese) || 0;
  const I30 = H3;
  const J30 = E30 * I30;

  // Formazione (€/anno proporzionato ai mesi)
  const E31 = Number(d.formazioneAnno) || 0;
  const I31 = H3;
  const J31 = E31 / 12 * I31;

  // Rimborso km (importo mese * mesi eleggibili)
  const F33 = Number(d.rimborsoKmMesiToglibili) || 0;
  const E33 = H2 - F33;
  const H33 = Number(d.rimborsoKmImportoMese) || 0;
  const J33 = H33 * E33;

  // Costo totale Sezione I
  const J34 = J5 + J6 + J8 + J10 + J12 + J13 + J15 + J17 + J18 + J20 + J22 + J24 + J25 + J26 + J27 + J28 + J29 + J30 + J31 + J33;

  // Catena ore lavorabili finali
  const C37 = 365 / 7 * Q2;
  const E37 = C37 * H2 / 12;
  const H37 = E37 * O10;      // Ore effettivamente lavorabili sull'intero periodo
  const I37 = H2 ? H37 / H2 : 0;
  const K37 = J34;
  const J37 = H37 ? K37 / H37 : 0;    // === COSTO ORARIO I ===

  // ===== SEZIONE II - SPESE IMPOSTE STANDARD / BANCHE / COMMERCIALISTA =====
  const H41 = S2 / 100 * 98;  // 98% del fatturato
  const I41 = Number(d.altriOneriBancari) || 0;
  const J41 = H41 ? I41 * K37 / H41 : 0;

  const G42 = Number(d.iresCoeff) || 0;
  const H42 = S2 - (S2 / 100 * 98);  // 2% del fatturato
  const I42 = H42 / 100 * G42;
  const J42 = H42 ? (K37 / 100 * (100 - 98)) * I42 / H42 : 0;

  const G43 = Number(d.commercialistaCoeff) || 0;
  const H43 = S2 / 100 * 98;
  const I43 = H43 / 100 * G43;
  const J43 = H43 ? I43 * K37 / H43 : 0;

  const J44 = J41 + J42 + J43;
  const K45 = K37 + J44;
  const J45 = H37 ? K45 / H37 : 0;    // === COSTO ORARIO II ===

  // ===== SEZIONE III - SPESE SEDE =====
  const H48 = S2 / 100 * 98;
  const I48 = Number(d.affittoSede) || 0;
  const J48 = H48 ? I48 * K37 / H48 : 0;

  const H49 = S2 / 100 * 98;
  const I49 = Number(d.cda) || 0;
  const J49 = H49 ? I49 * K37 / H49 : 0;

  const H50 = S2 / 100 * 98;
  const I50 = Number(d.abbonamentiGare) || 0;
  const J50 = H50 ? I50 * K37 / H50 : 0;

  const H51 = S2 / 100 * 98;
  const I51 = Number(d.sitoPec) || 0;
  const J51 = H51 ? I51 * K37 / H51 : 0;

  const H52 = S2 / 100 * 98;
  const I52 = Number(d.rc) || 0;
  const J52 = H52 ? I52 * K37 / H52 : 0;

  const J53 = J48 + J49 + J50 + J51 + J52;
  const K54 = K45 + J53;
  const J54 = H37 ? K54 / H37 : 0;    // === COSTO ORARIO III ===

  // ===== SEZIONE IV - SPESE EXTRA OPERATORE =====
  const G57 = 1;
  const H57 = Number(d.costoGiornoSostituzione) || 0;
  const I57 = Number(d.giorniSostituzione) || 0;
  const J57 = I57 * H57 * G57;

  const G58 = 1;
  const H58 = Number(d.raccomandata) || 0;
  const I58 = 1;
  const J58 = I58 * H58 * G58;

  const G59 = 1;
  const H59 = Number(d.visitaMedica) || 0;
  const I59 = 1;
  const J59 = I59 * H59 * G59;

  const G60 = 1;
  const H60 = Number(d.oreFormazioneSicurezza) || 0;
  const I60 = J37;
  const J60 = I60 * H60 * G60;

  const G61 = 1;
  const H61 = Number(d.oreIndiretteAltre) || 0;
  const I61 = J37;
  const J61 = I61 * H61 * G61;

  const G62 = 1;
  const H62 = Number(d.oreMaggiorazStraord) || 0;
  const I62 = J37 / 100 * 115;
  const J62 = I62 * H62 * G62;

  const G63 = 1;
  const H63 = Number(d.utenzeTelMobiliMese) || 0;
  const I63 = 12;
  const J63 = I63 * H63 * G63;

  const G64 = 1;
  const H64 = Number(d.rsKmMese) || 0;
  const I64 = H2;
  const J64 = I64 * H64 * G64;

  const J65 = J57 + J58 + J59 + J60 + J61 + J62 + J63 + J64;
  const K66 = K54 + J65;
  const J66 = H37 ? K66 / H37 : 0;    // === COSTO ORARIO IV ===

  // ===== SEZIONE V OMESSA (come da indicazioni utente) =====

  // ===== SEZIONE VII - TICKET LICENZIAMENTO (NASPI) =====
  const G79 = 1;
  const H79 = Number(d.aliquotaNaspi) || 0;
  const I79 = Number(d.massimaleAnnuoNaspi) || 0;
  const J79 = I79 / 100 * H79 * G79;
  const J80 = J79;
  const K81 = K66 + J80;              // V omessa quindi K76 = K66
  const J81 = H37 ? K81 / H37 : 0;    // === COSTO ORARIO FINALE (CON NASPI) ===

  return {
    // Input derivati
    H2, I2, K2, L2, M2, N2, O2, Q2, S2, H3, J2, P2, R2,
    // Ore
    O5, O6, O7, O8, O9, O10, C37, E37, H37, I37,
    // Sezione I dettaglio
    H5, I5, J5, H6, I6, J6, E8, H8, I8, J8, E10, H10, I10, J10,
    E12, F12, H12, I12, J12, E13, H13, I13, J13, E15, H15, I15, J15,
    L15, F17, E17, H17, J17, L17, H18, I18, J18, E20, F20, J20, L20,
    E22, F22, H22, I22, J22, E24, F24, H24, I24, J24,
    E25, F25, H25, I25, J25, E26, F26, H26, I26, J26,
    E27, F27, H27, I27, J27, E28, F28, H28, I28, J28,
    E29, F29, J29, E30, I30, J30, E31, I31, J31, F33, E33, H33, J33,
    J34, K37, J37,
    // Sezione II
    H41, I41, J41, G42, H42, I42, J42, G43, H43, I43, J43, J44, K45, J45,
    // Sezione III
    H48, I48, J48, H49, I49, J49, H50, I50, J50, H51, I51, J51, H52, I52, J52,
    J53, K54, J54,
    // Sezione IV
    G57, H57, I57, J57, H58, I58, J58, H59, I59, J59, H60, I60, J60,
    H61, I61, J61, H62, I62, J62, H63, I63, J63, H64, I64, J64,
    J65, K66, J66,
    // Sezione VII
    H79, I79, J79, J80, K81, J81
  };
}

// ===================== INPUT CELL COMPONENT =====================
function NumCell({ value, onChange, decimals, width, disabled }) {
  const [local, setLocal] = useState('');
  const [editing, setEditing] = useState(false);
  const dec = decimals !== undefined ? decimals : 2;
  useEffect(() => {
    if (!editing) {
      if (value === 0 || value === null || value === undefined) setLocal('');
      else setLocal(Number(value).toLocaleString('it-IT', { minimumFractionDigits: dec, maximumFractionDigits: Math.max(dec,4) }));
    }
  }, [value, editing, dec]);
  return (
    <input
      className="cell"
      disabled={disabled}
      style={width ? { width: width } : undefined}
      value={local}
      onFocus={(e)=>{ setEditing(true); if (value===0) setLocal(''); else setLocal(String(value).replace('.', ',')); setTimeout(()=>e.target.select(),0); }}
      onChange={(e)=>setLocal(e.target.value)}
      onBlur={()=>{ setEditing(false); const n = parseIt(local); onChange(n); }}
      onKeyDown={(e)=>{ if (e.key==='Enter') e.target.blur(); }}
    />
  );
}

function TextCell({ value, onChange, placeholder, upper }) {
  return (
    <input
      className="cell text"
      value={value || ''}
      placeholder={placeholder || ''}
      onChange={(e)=>onChange(upper ? e.target.value.toUpperCase() : e.target.value)}
    />
  );
}

function exportTuttiExcel(dipendenti) {
  if (dipendenti.length === 0) return;
  const wb = XLSX.utils.book_new();
  wb.Props = { Author:'Christian Canonica', Company:'Spazio Ireos Società Cooperativa Sociale', Title:'Costo orario tutti i dipendenti', CreatedDate:new Date() };

  // Foglio riepilogo confronto
  const header = ['Metrica', ...dipendenti.map(d => (d.cognome+' '+d.nome+' ('+d.livello+')').trim())];
  const rows = [header];
  const addRow = (lbl, getter, dec) => {
    rows.push([lbl, ...dipendenti.map(d => {
      const v = getter(d, calcola(d));
      if (typeof v === 'number') return Number(v.toFixed(dec !== undefined ? dec : 2));
      return v;
    })]);
  };
  addRow('Mesi lavoro', d => d.mesiLavoro, 0);
  addRow('Mesi maternità', d => d.mesiMaternita, 0);
  addRow('Ore sett. contrattuali', d => d.oreSettContrattuali, 0);
  addRow('Lordo t.pieno €/mese', d => d.lordoTPieno);
  addRow('Supermin €', d => d.supermin);
  addRow('Fatturato annuo prev. €', d => d.fatturatoAnnuoPrevisto, 0);
  addRow('Importo orario CCNL (J2)', (d,c) => c.J2, 4);
  addRow('Ore effettiv. lavorabili (H37)', (d,c) => c.H37, 2);
  addRow('Imponibile I', (d,c) => c.L15);
  addRow('Imponibile III', (d,c) => c.L20);
  addRow('Costo tot. lavoro I (€/anno)', (d,c) => c.K37, 0);
  addRow('Costo tot. lavoro II (€/anno)', (d,c) => c.K45, 0);
  addRow('Costo tot. lavoro III (€/anno)', (d,c) => c.K54, 0);
  addRow('Costo tot. lavoro IV (€/anno)', (d,c) => c.K66, 0);
  addRow('Costo tot. lavoro VII (€/anno)', (d,c) => c.K81, 0);
  addRow('Costo orario I (€/h)', (d,c) => c.J37, 4);
  addRow('Costo orario II (€/h)', (d,c) => c.J45, 4);
  addRow('Costo orario III (€/h)', (d,c) => c.J54, 4);
  addRow('Costo orario IV (€/h)', (d,c) => c.J66, 4);
  addRow('COSTO ORARIO FINALE VII (€/h)', (d,c) => c.J81, 4);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wch = [{wch:34}];
  for (let i=0; i<dipendenti.length; i++) wch.push({wch:18});
  ws['!cols'] = wch;
  XLSX.utils.book_append_sheet(wb, ws, 'Confronto');

  // Un foglio per dipendente (sintesi)
  dipendenti.forEach(d => {
    const c = calcola(d);
    const r = [];
    r.push([`${d.cognome} ${d.nome} — Livello ${d.livello}`]);
    r.push([d.note || '']);
    r.push([]);
    r.push(['Input principali', '']);
    r.push(['Mesi lavoro', d.mesiLavoro]);
    r.push(['Mesi maternità', d.mesiMaternita]);
    r.push(['Lordo t.pieno', d.lordoTPieno]);
    r.push(['Ore sett. contratt.', d.oreSettContrattuali]);
    r.push(['Fatturato annuo prev.', d.fatturatoAnnuoPrevisto]);
    r.push([]);
    r.push(['Risultati', '']);
    r.push(['Ore effett. lavorabili (H37)', Number(c.H37.toFixed(2))]);
    r.push(['Imponibile I (L15)', Number(c.L15.toFixed(2))]);
    r.push(['Imponibile III (L20)', Number(c.L20.toFixed(2))]);
    r.push(['Costo tot. lavoro I (K37)', Number(c.K37.toFixed(2))]);

    const safeName = ((d.cognome+'_'+d.nome) || d.id).replace(/[^a-zA-Z0-9]/g,'').slice(0,28) || d.id;
    XLSX.utils.book_append_sheet(wb, wsd, safeName);
  });

  const now = new Date();
  const mesi = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

  const timeStr = pad(now.getHours())+'.'+pad(now.getMinutes());
  const filename = `Costo orario dipendenti ${dateStr} - ver1 - ${timeStr}.xlsx`;
  XLSX.writeFile(wb, filename);
}

// ===================== APP PRINCIPALE =====================
const STORAGE_KEY = 'spazioireos_costo_orario_v1';

function App() {
  const [dipendenti, setDipendenti] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch(ex) { return []; }
  });
  const [view, setView] = useState('dashboard');
  const [currentId, setCurrentId] = useState(null);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(dipendenti)); } catch(ex) {}
  }, [dipendenti]);

  const handleNew = () => setView('wizard');

  const handleEdit = (id) => {
    setCurrentId(id);
    setView('edit');
  };

  const handleDelete = (id) => {
    const d = dipendenti.find(x => x.id === id);
    if (!d) return;
    if (confirm(`Eliminare definitivamente "${d.cognome} ${d.nome}"?`)) {
      setDipendenti(p => p.filter(x => x.id !== id));
    }
  };

  const handleDuplicate = (id) => {
    const d = dipendenti.find(x => x.id === id);
    if (!d) return;
    const copy = { ...d, id: uid(), cognome: d.cognome + ' (copia)', createdAt: new Date().toISOString() };
    setDipendenti(p => [...p, copy]);
  };

  const handleWizardSave = (draft) => {
    setDipendenti(p => [...p, draft]);
    setView('dashboard');
  };

  const handleEditSave = (mod) => {
    setDipendenti(p => p.map(x => x.id === mod.id ? mod : x));
    setView('dashboard');
  };

  const handleCompare = () => setView('confronto');
  const handleExportAll = () => exportTuttiExcel(dipendenti);
  const handleExportSingle = (d) => exportSingoloExcel(d);
  const handleExportCompare = () => exportTuttiExcel(dipendenti);

  const current = dipendenti.find(d => d.id === currentId);

  return (
    <div>
      <div className="app-header">
        <div>
          <h1>Costo Orario Dipendenti — Spazio Ireos</h1>
          <div className="sub">Rendicontazione interna · Cooperativa Sociale · C.F. 06314390961</div>
        </div>
        <div className="actions">
          <button className="ghost" style={{color:'#fff', borderColor:'rgba(255,255,255,0.4)'}}
                  onClick={() => {
                    if (confirm('Esportare un backup JSON di tutti i dipendenti su file locale?')) {
                      const blob = new Blob([JSON.stringify(dipendenti, null, 2)], { type:'application/json' });
                      const u = URL.createObjectURL(blob);
                      const a = document.createElement('a');
                      a.href = u;
                      const pad = (n) => String(n).padStart(2,'0');
                      const now = new Date();
                      const mesi = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
                      a.download = `Costo orario backup ${pad(now.getDate())}${mesi[now.getMonth()]}${String(now.getFullYear()).slice(-2)} - ${pad(now.getHours())}.${pad(now.getMinutes())}.json`;
                      a.click();
                      URL.revokeObjectURL(u);
                    }
                  }}>
            Backup JSON
          </button>
          <label className="ghost" style={{color:'#fff', borderColor:'rgba(255,255,255,0.4)', padding:'7px 14px', borderRadius:4, cursor:'pointer', fontSize:13, fontWeight:700, border:'1px solid rgba(255,255,255,0.4)', background:'transparent'}}>
            Ripristina JSON
            <input type="file" accept="application/json" style={{display:'none'}} onChange={(e) => {
              const f = e.target.files[0];
              if (!f) return;
              const r = new FileReader();
              r.onload = (ev) => {
                try {
                  const arr = JSON.parse(ev.target.result);
                  if (!Array.isArray(arr)) throw new Error('File non valido');
                  if (confirm(`Il file contiene ${arr.length} dipendenti. Sovrascrivere i dati attuali (${dipendenti.length})?`)) {
                    setDipendenti(arr);
                  }
                } catch(ex) {
                  alert('File non valido: ' + ex.message);
                }
              };
              r.readAsText(f);
              e.target.value = '';
            }} />
          </label>
        </div>
      </div>

      {view === 'dashboard' && (
        <Dashboard
          dipendenti={dipendenti}
          onNew={handleNew}
          onEdit={handleEdit}
          onDelete={handleDelete}
          onDuplicate={handleDuplicate}
          onCompare={handleCompare}
          onExportAll={handleExportAll}
        />
      )}
      {view === 'wizard' && (
        <Wizard
          onCancel={() => setView('dashboard')}
          onSave={handleWizardSave}
        />
      )}
      {view === 'edit' && current && (
        <EditDipendente
          dipendente={current}
          onSave={handleEditSave}
          onCancel={() => setView('dashboard')}
          onExport={handleExportSingle}
        />
      )}
      {view === 'confronto' && (
        <Confronto
          dipendenti={dipendenti}
          onBack={() => setView('dashboard')}
          onExport={handleExportCompare}
        />
      )}

      <div className="footer-note">
        Spazio Ireos Società Cooperativa Sociale — C.F./P.IVA 06314390961 — Via L. Temolo 4, 20126 Milano — autore: Christian Canonica
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
